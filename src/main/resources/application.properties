spring.application.name=Garage

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:h2:mem:garage;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JWT
jwt.secret=ThisIsASecretKeyForJwtDontUseInProductionChangeMe123456
jwt.expirationMs=86400000

# OpenAI (fault classification) - set OPENAI_API_KEY as an environment variable
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
