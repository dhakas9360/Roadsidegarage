spring.application.name=Garage
server.port=${PORT:8080}

# H2 console (only meaningful when running on the default H2 datasource below)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Datasource - defaults to in-memory H2 for local dev. In production, set
# SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
# (e.g. jdbc:postgresql://host:5432/dbname) to use a real, persistent database.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:garage;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update

# JWT (override with a real secret via the JWT_SECRET env var in production)
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForJwtDontUseInProductionChangeMe123456}
jwt.expirationMs=86400000

# OpenAI (fault classification) - set OPENAI_API_KEY as an environment variable
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
